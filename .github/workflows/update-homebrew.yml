name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Release Binaries"]
    types:
      - completed

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Exit if build failed
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: exit 1

      - name: Checkout homebrew tap repo
        uses: actions/checkout@v3
        with:
          repository: antero-software/homebrew-lazy-ssm
          token: ${{ secrets.GH_PAT }}
          path: homebrew-tap

      - name: Get tag from triggering commit
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          TAG_NAME=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/tags?per_page=100" | \
            jq -r '.[] | select(.commit.sha=="'"$SHA"'") | .name' | head -1)

          if [ -z "$TAG_NAME" ]; then
            echo "❌ Tag not found for SHA $SHA"
            exit 1
          fi

          echo "VERSION=$TAG_NAME" >> $GITHUB_ENV

      - name: Download release binaries and compute hashes
        run: |
          curl -LO https://github.com/antero-software/lazy-ssm/releases/download/$VERSION/lazy-ssm-darwin-arm64.tar.gz
          curl -LO https://github.com/antero-software/lazy-ssm/releases/download/$VERSION/lazy-ssm-darwin-amd64.tar.gz
          curl -LO https://github.com/antero-software/lazy-ssm/releases/download/$VERSION/lazy-ssm-linux-arm64.tar.gz
          curl -LO https://github.com/antero-software/lazy-ssm/releases/download/$VERSION/lazy-ssm-linux-amd64.tar.gz
          echo "ARM_SHA=$(shasum -a 256 lazy-ssm-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "AMD_SHA=$(shasum -a 256 lazy-ssm-darwin-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "LINUX_ARM_SHA=$(shasum -a 256 lazy-ssm-linux-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "LINUX_AMD_SHA=$(shasum -a 256 lazy-ssm-linux-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Bootstrap formula if absent
        run: |
          cd homebrew-tap/Formula
          if [ ! -f lazy-ssm.rb ]; then
            cat > lazy-ssm.rb << 'FORMULA'
          class LazySsm < Formula
            desc "On-demand AWS SSM tunnels to RDS databases through EC2 bastion instances"
            homepage "https://github.com/antero-software/lazy-ssm"
            version "PLACEHOLDER_VERSION"

            on_macos do
              on_arm do
                url "https://github.com/antero-software/lazy-ssm/releases/download/PLACEHOLDER_VERSION/lazy-ssm-darwin-arm64.tar.gz"
                sha256 "PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/antero-software/lazy-ssm/releases/download/PLACEHOLDER_VERSION/lazy-ssm-darwin-amd64.tar.gz"
                sha256 "PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/antero-software/lazy-ssm/releases/download/PLACEHOLDER_VERSION/lazy-ssm-linux-arm64.tar.gz"
                sha256 "PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/antero-software/lazy-ssm/releases/download/PLACEHOLDER_VERSION/lazy-ssm-linux-amd64.tar.gz"
                sha256 "PLACEHOLDER"
              end
            end

            def install
              bin.install "lazy-ssm"
            end

            service do
              run [opt_bin/"lazy-ssm"]
              keep_alive true
              log_path var/"log/lazy-ssm.log"
              error_log_path var/"log/lazy-ssm.log"
              working_dir var
            end

            test do
              system "#{bin}/lazy-ssm", "version"
            end
          end
          FORMULA
          fi

      - name: Update Formula file
        run: |
          cd homebrew-tap/Formula

          # Update version and URLs
          sed -i "s/version \".*\"/version \"$VERSION\"/" lazy-ssm.rb
          sed -i "s|download/.*/lazy-ssm-darwin-arm64.tar.gz|download/$VERSION/lazy-ssm-darwin-arm64.tar.gz|" lazy-ssm.rb
          sed -i "s|download/.*/lazy-ssm-darwin-amd64.tar.gz|download/$VERSION/lazy-ssm-darwin-amd64.tar.gz|" lazy-ssm.rb
          sed -i "s|download/.*/lazy-ssm-linux-arm64.tar.gz|download/$VERSION/lazy-ssm-linux-arm64.tar.gz|" lazy-ssm.rb
          sed -i "s|download/.*/lazy-ssm-linux-amd64.tar.gz|download/$VERSION/lazy-ssm-linux-amd64.tar.gz|" lazy-ssm.rb

          # Update sha256 for each arch individually
          sed -i "/darwin-arm64.tar.gz/{n;s/sha256 \".*\"/sha256 \"$ARM_SHA\"/;}" lazy-ssm.rb
          sed -i "/darwin-amd64.tar.gz/{n;s/sha256 \".*\"/sha256 \"$AMD_SHA\"/;}" lazy-ssm.rb
          sed -i "/linux-arm64.tar.gz/{n;s/sha256 \".*\"/sha256 \"$LINUX_ARM_SHA\"/;}" lazy-ssm.rb
          sed -i "/linux-amd64.tar.gz/{n;s/sha256 \".*\"/sha256 \"$LINUX_AMD_SHA\"/;}" lazy-ssm.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lazy-ssm.rb
          git commit -m "chore: update formula to $VERSION"
          git push
